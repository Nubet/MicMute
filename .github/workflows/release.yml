name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows artifacts
        run: node scripts/verify-win-packaging-tools.mjs && npm run build && npx electron-builder build --config electron-builder.mjs --win --publish never

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.9.1

      - name: Sign release artifacts with Cosign keyless
        shell: pwsh
        run: |
          $filesToSign = Get-ChildItem -Path dist -File | Where-Object {
            $_.Extension -in @('.exe', '.blockmap', '.yml') -and $_.Name -notlike 'builder-debug.yml'
          }

          foreach ($file in $filesToSign) {
            cosign sign-blob --yes --bundle "$($file.FullName).bundle" "$($file.FullName)"
          }

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
            dist/*.bundle
