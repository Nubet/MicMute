name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-win:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows artifacts
        run: node scripts/verify-win-packaging-tools.mjs && npm run build && npx electron-builder build --config electron-builder.mjs --win --publish never

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.9.1

      - name: Sign release artifacts with Cosign keyless
        shell: pwsh
        run: |
          $filesToSign = Get-ChildItem -Path dist -File | Where-Object {
            $_.Extension -in @('.exe', '.blockmap', '.yml') -and $_.Name -notlike 'builder-debug.yml'
          }

          foreach ($file in $filesToSign) {
            cosign sign-blob --yes --bundle "$($file.FullName).bundle" "$($file.FullName)"
          }

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-win
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
            dist/*.bundle

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Linux artifacts
        run: node scripts/verify-linux-packaging-tools.mjs && npm run build && npx electron-builder build --config electron-builder.mjs --linux --publish never

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.9.1

      - name: Sign Linux artifacts with Cosign keyless
        shell: bash
        run: |
          shopt -s nullglob
          for file in dist/*.deb dist/*.rpm; do
            cosign sign-blob --yes --bundle "${file}.bundle" "$file"
          done

      - name: Upload Linux release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            dist/*.deb
            dist/*.rpm
            dist/*.bundle

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-win
      - build-linux

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-win
          path: dist

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-linux
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/*.exe
            dist/*.blockmap
            dist/*.deb
            dist/*.rpm
            dist/latest.yml
            dist/*.bundle
